steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'hireiq'
      - '--image=europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GROQ_API_KEY=GROQ_API_KEY:latest'
      - '--set-env-vars=LLM_PROVIDER=groq'
      - '--memory=2Gi'
      - '--timeout=300'
      - '--project=hireiq-app-2026'

images:
  - 'europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/hireiq-app-2026/hireiq-repo/hireiq:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
